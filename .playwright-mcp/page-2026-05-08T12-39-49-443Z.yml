              - paragraph [ref=e239]:
                - text: QUE TAL MORAR NO BELÉM E A PASSOS DO METRÔ, NA MELHOR QUADRA E ESQUINA DO BAIRRO, EM UM DOS RESIDENCIAIS MAIS DESEJADOS - O COLLORI PARQUE CLUB !
                - text: É esse charmoso e aconchegante ap do RESIDENCIAL COLLORI, com 106m2 úteis, móveis planejados e planta super bem resolvida e espaçosa, ótima ventilação e iluminação natural, um incrível pôr do sol e vista livre para Serra da Cantareira.
                - text: São 2 excelentes dormitórios, sendo 2 suítes com closet, 1 home office, amplo living com 3 ambientes e lavabo, integrado à uma convidativa e espaçosa varanda gourmet, ótima cozinha, área de serviços e 2 excelentes vagas de garagem, fixas e escrituradas.
                - text: "Seu clube privativo é um show à parte: piscina coberta e aquecida com raias de 25 metros, 3 piscinas externas e climatizadas, academia super equipada, quadra poliesportiva e tudo mais. Com certeza, um pacote completo de lazer, entretenimento e diversão para toda família. O Residencial ainda conta com uma equipe de monitores e personal trainers contratados, que oferecem diversas atividades físicas e de recreação, ao longo de todo ano, e já inclusas no condomínio. Incrível não é . Corretora Elo 11- Ver dados Whatzapp - 22/04/2024"
