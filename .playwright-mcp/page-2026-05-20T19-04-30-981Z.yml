      - generic [ref=e69]:
        - paragraph [ref=e70]: Perguntas Frequentes
        - generic [ref=e71]:
          - generic [ref=e72]:
            - heading "Como vou receber contatos de pessoas interessadas no meu imóvel?" [level=2] [ref=e73] [cursor=pointer]:
              - generic [ref=e74]: Como vou receber contatos de pessoas interessadas no meu imóvel?
              - img [ref=e76]
            - paragraph [ref=e78] [cursor=pointer]: No Chaves na Mão, temos múltiplos pontos de conversão no site, o que aumenta suas chances de receber mais leads. Quando alguém se interessar pelo seu imóvel, você será notificado via WhatsApp/ e-mail. Isso permite que você não perca nenhuma oportunidade de conexão com potenciais compradores ou locatários.
          - generic [ref=e79]:
            - heading "Como aumentar a visibilidade do meu imóvel?" [level=2] [ref=e80] [cursor=pointer]:
              - generic [ref=e81]: Como aumentar a visibilidade do meu imóvel?
              - img [ref=e83]
            - paragraph [ref=e85] [cursor=pointer]: Para que seu imóvel seja visto por mais pessoas, é importante preencher todos os detalhes relevantes e adicionar o máximo de informações possível ao seu anúncio. Além disso, invista em fotos de alta qualidade e quantidade adequada, destacando os melhores ângulos e características do imóvel. Quanto mais completo e atrativo for o seu anúncio, mais chances ele terá de ser visto por potenciais compradores ou locatários, aumentando as chances de fechar negócio rapidamente. Você também pode optar por entrar em contato com nossa equipe de atendimento para contratar destaques e potencializar ainda mais seus resultados.
          - generic [ref=e86]:
            - heading "O Chaves na Mão intermedeia a venda ou aluguel do meu imóvel?" [level=2] [ref=e87] [cursor=pointer]:
              - generic [ref=e88]: O Chaves na Mão intermedeia a venda ou aluguel do meu imóvel?
              - img [ref=e90]
            - paragraph [ref=e92] [cursor=pointer]: Não, o Chaves na Mão não realiza intermediações, nem oferece serviços de consultoria. Somos uma plataforma online que permite que você publique anúncios diretamente. Nosso objetivo é conectar você a potenciais compradores ou locatários, facilitando a visibilidade do seu imóvel. A negociação, comunicação e formalização do negócio ficam totalmente sob responsabilidade do anunciante e dos interessados.
          - generic [ref=e93]:
            - heading "Quais são as dicas de segurança do Chaves na Mão?" [level=2] [ref=e94] [cursor=pointer]:
              - generic [ref=e95]: Quais são as dicas de segurança do Chaves na Mão?
              - img [ref=e97]
            - paragraph [ref=e99] [cursor=pointer]:
              - text: "Sua segurança é prioridade no Chaves na Mão. Confira nossas recomendações:"
              - generic [ref=e100]:
                - generic [ref=e101]:
                  - strong [ref=e102]: "° Proteção de dados:"
                  - text: Nunca solicitamos PINs, senhas ou códigos de confirmação. Se alguém entrar em contato alegando ser do portal, desconfie.
                - generic [ref=e103]:
                  - strong [ref=e104]: "° Negociações seguras:"
                  - text: Evite pagamentos antecipados e desconfie de ofertas com valores muito abaixo do mercado.
                - generic [ref=e105]:
                  - strong [ref=e106]: "° Verificação de informações:"
                  - text: Antes de fechar negócios, ligue para o anunciante e revise a documentação cuidadosamente.
                - generic [ref=e107]:
                  - strong [ref=e108]: "° Plataforma de classificados:"
                  - text: Somos um portal para conectar compradores e vendedores. Não realizamos consultoria ou intermediações diretas.
              - text: Adote essas práticas para uma experiência segura e confiável!
