        - generic [ref=e68]:
          - generic [ref=e69]:
            - heading "Como abrir uma conta no Chaves na Mão?" [level=2] [ref=e70] [cursor=pointer]:
              - generic [ref=e71]: Como abrir uma conta no Chaves na Mão?
              - img [ref=e73]
            - paragraph [ref=e75] [cursor=pointer]:
              - text: Abrir uma conta no Chaves na Mão é simples e rápido. Primeiro, escolha se quer anunciar um automóvel ou um imóvel.
              - text: Se você é pessoa física, preencha o formulário com seus dados, efetue o pagamento e publique seu anúncio.
              - text: Se você é pessoa jurídica, é só preencher o formulário e aguardar o contato do nosso especialista em anúncios. Seus dados estarão protegidos e serão usados apenas para ir a segurança e eficiência da plataforma.
          - generic [ref=e76]:
            - heading "Como procurar um imovel no Chaves na Mão?" [level=2] [ref=e77] [cursor=pointer]:
              - generic [ref=e78]: Como procurar um imovel no Chaves na Mão?
              - img [ref=e80]
            - paragraph [ref=e82] [cursor=pointer]: "Procurar um imóvel no Chaves na Mão é fácil. No campo de busca da página inicial, insira a cidade, bairro ou rua onde deseja encontrar o imóvel. Depois, escolha o tipo de transação: \"Alugar\" ou \"Comprar\". Use os filtros para ajustar os resultados, como faixa de preço, número de quartos e tipo de imóvel. Assim, você visualiza apenas as opções que atendem às suas necessidades."
          - generic [ref=e83]:
            - heading "Como funciona o destaque no anúncio?" [level=2] [ref=e84] [cursor=pointer]:
              - generic [ref=e85]: Como funciona o destaque no anúncio?
              - img [ref=e87]
            - paragraph [ref=e89] [cursor=pointer]: Os destaques no Chaves na Mão aumentam a visibilidade do seu anúncio, posicionando-o acima dos anúncios padrões. Os destaques são acionados quando o usuário ativa critérios do filtro (cidade/ bairro/ rua) permitindo que o anúncio receba mais atenção de potenciais interessados. Com mais visibilidade, você tem mais oportunidades de fechar negócios rapidamente.
