      - generic [ref=e67]:
        - paragraph [ref=e68]: Perguntas Frequentes
        - generic [ref=e69]:
          - generic [ref=e70]:
            - heading "É seguro anunciar no Chaves na Mão?" [level=2] [ref=e71] [cursor=pointer]:
              - generic [ref=e72]: É seguro anunciar no Chaves na Mão?
              - img [ref=e74]
            - paragraph [ref=e76] [cursor=pointer]:
              - text: O Chaves na Mão segue os mais altos protocolos de segurança para proteger seus usuários. Como portal de anúncios online, nossa missão é conectar pessoas interessadas na compra, venda ou locação de imóveis, carros e motos, de modo que não prestamos serviços de consultoria ou intermediações de negócios entre anunciantes e usuários.
              - strong [ref=e77]: "Lembre-se:"
              - text: nunca pedimos PINs, senhas ou códigos de confirmação. Desconfie de ofertas com preços abaixo do mercado e evite pagamentos antecipados. Verifique toda a documentação e, em caso de dúvida, entre em contato diretamente com o anunciante. Nunca deixe de seguir essas dicas de segurança para anúncios imobiliários automotivos.
          - generic [ref=e78]:
            - heading "Posso ter mais de uma conta com o mesmo CPF?" [level=2] [ref=e79] [cursor=pointer]:
              - generic [ref=e80]: Posso ter mais de uma conta com o mesmo CPF?
              - img [ref=e82]
            - paragraph [ref=e84] [cursor=pointer]: Infelizmente, não é permitido ter mais de uma conta com o mesmo CPF no Chaves na Mão. Isso serve para garantir maior segurança e controle sobre os dados e transações. Isso também ajuda a proteger sua conta e suas informações pessoais, evitando fraudes e garantindo que todas as negociações sejam transparentes.
          - generic [ref=e85]:
            - heading "Onde meu anúncio será exibido no Chaves na Mão?" [level=2] [ref=e86] [cursor=pointer]:
              - generic [ref=e87]: Onde meu anúncio será exibido no Chaves na Mão?
              - img [ref=e89]
            - paragraph [ref=e91] [cursor=pointer]: Se você anunciou um imóvel, ele aparecerá na aba de "Imóveis", enquanto anúncios de veículos serão exibidos na aba de "Veículos". Isso permite que seu anúncio seja visto por pessoas interessadas na categoria específica, aumentando sua visibilidade e permitindo que o público correto encontre facilmente seu produto.
          - generic [ref=e92]:
            - heading "Como cancelar meu anúncio no Chaves na Mão?" [level=2] [ref=e93] [cursor=pointer]:
              - generic [ref=e94]: Como cancelar meu anúncio no Chaves na Mão?
              - img [ref=e96]
            - paragraph [ref=e98] [cursor=pointer]:
              - text: Se você é um anunciante pessoa física, acesse sua conta através do painel administrativo e desative seu anúncio.
              - text: Se você é um anunciante pessoa jurídica, envie um e-mail para
              - strong [ref=e99]: cancelamento@chavesnamao.com.br.
              - text: Antes de prosseguir, lembre-se de que sua conta no Chaves na Mão é uma poderosa ferramenta para gerar leads e atrair interessados em seus anúncios.
